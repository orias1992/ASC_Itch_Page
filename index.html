<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #1a1a2e;
      color: #eee;
    }

    .tabs {
      display: flex;
      gap: 8px;
      padding: 10px;
      background: #16213e;
      flex-wrap: wrap;
    }

    .tab-btn {
      padding: 8px 16px;
      background: #0f3460;
      color: #eee;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .tab-btn.active {
      background: #e94560;
    }

    .page {
      display: none;
      padding: 20px;
    }

    .page.active {
      display: block;
    }
  </style>
</head>
<body>

  <div class="tabs">
    <button class="tab-btn active" onclick="showPage('about')">About</button>
    <button class="tab-btn" onclick="showPage('features')">Features</button>
    <button class="tab-btn" onclick="showPage('credits')">Credits</button>
  </div>

  <div id="about" class="page active">
    <h2>About the Game</h2>
    <p>Write your game description here.</p>
  </div>

  <div id="features" class="page">
    <h2>Features</h2>
    <p>List your game features here.</p>
  </div>

  <div id="credits" class="page">
    <h2>Credits</h2>
    <p>Who made the game?</p>
  </div>

  <script>
    function showPage(id) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      event.target.classList.add('active');
    }
  </script>

</body>
</html>
